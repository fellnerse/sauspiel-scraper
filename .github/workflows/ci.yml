name: CI

on:
  push:
    branches: [ main, "refactor/**" ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv

        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Run prek
        run: uv run prek run --all-files

      - name: Verify commit messages (Conventional Commits)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            uv run cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
          else
            uv run cz check --rev-range ${{ github.event.before }}..${{ github.event.after }}
          fi

      - name: Run tests
        run: uv run pytest
